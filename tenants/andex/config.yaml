# Tenant DEMO: Andex (Distribuidora Andina del Pacífico S.A.) — empresa FICTICIA.
#
# Sirve para mostrar la plataforma a prospectos sin exponer datos de ningún
# cliente real. Estructura paralela a Biodegradables (2 sucursales Quito/Guayaquil,
# mismos códigos UIO/GYE) para reutilizar TODA la lógica del motor sin cambios.
# Se activa con TENANT_SLUG=andex + TENANT_CONFIG_SOURCE=yaml (+ DEMO_MODE=1 para
# el sandbox de correo). Ningún dato aquí es real.

