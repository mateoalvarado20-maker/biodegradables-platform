# Configuración del tenant: Biodegradables Ecuador (tenant #1 de VER-IA).
#
# ⚡ EN PRODUCCIÓN desde 2026-07-02 (F2.1): el App Service corre con
# TENANT_CONFIG_SOURCE=yaml + TENANT_SLUG=biodegradables, así que ESTE archivo
# ES la fuente de verdad de destinatarios, horarios, metas, umbrales, feriados,
# identidad y directorio de personas. core_config.py conserva los mismos
# valores como defaults legacy (los usa azfunc/, que no incluye core/); la
# equivalencia la fijan tests/test_tenant_config_biodegradables.py y
# tests/test_core_config_switch.py.

slug: biodegradables
display_name: "Biodegradables Ecuador"
locale: es-EC
timezone: America/Guayaquil

recipients:
  commercial_report:                       # core_config.JEFE
    - dsanchez@biodegradablesecuador.com
    - gsanchez@biodegradablesecuador.com
  commercial_report_cc:                    # core_config.MIO
    - malvarado@biodegradablesecuador.com
  logistics_report:                        # core_config.GABRIELA
    - gsanchez@biodegradablesecuador.com
  calendar_sync_users:                     # core_config.CALENDAR_SYNC_USERS
    - dsanchez@biodegradablesecuador.com
    - gsanchez@biodegradablesecuador.com

branding:
  brand_color: "#2E7D32"                   # verde corporativo (generate_bot_icons.py)
  logo_url: null

company:                                   # core_config.COMPANY_* (prompts/reportes)
  sector: "distribución de productos biodegradables"
  sucursales_desc: "Quito (UIO) y Guayaquil (GYE)"
  sucursal_names:                          # core_config.SUCURSAL_NAMES (código -> ciudad)
    UIO: Quito
    GYE: Guayaquil
  domain: biodegradablesecuador.com        # filtra correos internos (reply agent)
  website: "https://www.biodegradablesecuador.com/"
  outbound_signer: malvarado@biodegradablesecuador.com  # firma correos a prospectos

erp:                                       # F2.4 — core_config.DOC_PREFIXES
  document_prefixes:                       # sucursal -> prefijo de documento Contifico
    GYE: "001-001"
    UIO: "001-002"

caja:                                      # F2.4 — fondo fijo del cierre de caja
  fondo_default: 50.00
  fondo_por_sucursal:
    Guayaquil: 100.00
    Quito: 50.00

# logistics.provincia_keywords: ausente = dataset default de Ecuador
# (daily_logistics_report.PROVINCIA_KEYWORDS_EC). Solo se declara para
# tenants de otro país.

people:                                    # core_config.PEOPLE (directorio identidad/roles)
  - email: dsanchez@biodegradablesecuador.com
    name: "Daniel Sánchez"
    role: gerente_general
    supervisor: true
  - email: gsanchez@biodegradablesecuador.com
    name: "Gabriela Sánchez"
    role: gerente_comercial
  - email: malvarado@biodegradablesecuador.com
    name: "Mateo Alvarado"
    role: analista
  - email: info@biodegradablesecuador.com
    name: "Gabriela Bravo"
    role: asistente
    sucursal: GYE
    asistente_num: 1
    rotativo_sabado: true
  - email: quito@biodegradablesecuador.com
    name: "Gladys López"
    role: asistente
    sucursal: UIO
    asistente_num: 1
  - email: jsolorzano@biodegradablesecuador.com
    name: "José Solórzano"
    role: chofer
    sucursal: GYE
    asistente_num: 2
    rotativo_sabado: true

commercial:
  meta_factor: 1.20                        # core_config.META_FACTOR (meta = PY x 1.20)
  py_override:                             # core_config.PY_OVERRIDE, keyed "YYYY-MM"
    "2026-05": 38000.0
  thresholds:                              # core_config umbrales del semáforo
    cumpl_verde: 1.00
    cumpl_amarillo: 0.85
    ayer_verde: 1.00
    ayer_amarillo: 0.80
    mora_verde: 0.05
    mora_amarillo: 0.10
  dashboard_url: "https://app.powerbi.com/groups/me/reports/de5387d4-8203-4a93-8eaf-04212041fece"

checkin:                                   # core_config CHECKIN_* (hora local del tenant)
  oficina:
    users:
      - malvarado@biodegradablesecuador.com
      - gsanchez@biodegradablesecuador.com
    weekday_time: "16:30"                  # CHECKIN_WEEKDAY_OFICINA
  sucursales:
    users:
      - info@biodegradablesecuador.com
      - quito@biodegradablesecuador.com
    weekday_time: "17:10"                  # CHECKIN_WEEKDAY_SUCURSALES
    saturday_time: "12:30"                 # CHECKIN_SATURDAY_SUCURSALES

# Módulos contratados (F2.3 — core_config.MODULES). Biodegradables usa el
# catálogo completo. Apagar un módulo quita sus jobs, su lugar en el catch-up
# y el dead-man, y sus tools de los bots — todo a la vez.
modules:
  commercial: true      # reporte comercial 8AM + recap mensual + forecasting
  logistics: true       # reporte de logística (con LOGISTICS_IN_BOT=1)
  cobranzas: true       # auto-asignación de cartera (requiere activities)
  activities: true      # check-ins, tareas, reminders, consolidado
  chofer: true          # ruta/asistencia del chofer (requiere activities)
  news_brief: true      # brief de noticias del Data Bot
  calendar: true        # sync a calendario (con CALENDAR_SYNC_ENABLED=1)
  marketing: true       # KPIs de HubSpot

# Horarios de los jobs del scheduler (F2.2 — core_config.JOB_SCHEDULES).
# Cambiar un horario aquí mueve a la vez el cron, el catch-up y el dead-man
# switch (/health/deliveries). days: "mon-fri" | "mon-sat" | "mon" | "daily".
# Los jobs mensuales usan day_of_month (1-28) en lugar de days.
schedules:
  morning_sales:            { time: "08:00", days: mon-sat }   # reporte comercial
  logistics_morning:        { time: "08:00", days: mon-sat }   # reporte logística
  auto_assign_cobranzas:    { time: "07:30", days: mon-fri }   # antes del comercial
  task_confirmations:       { time: "09:00", days: mon-fri }
  calendar_sync:            { time: "08:45", days: mon-fri }
  daily_news_brief:         { time: "06:00", days: daily }
  apertura_caja_matinal:    { time: "08:15", days: mon-fri }   # recordatorio matinal
  consolidated_daily:       { time: "18:30", days: mon-fri }   # resumen del equipo
  saturday_recap:           { time: "08:00", days: mon }       # lunes, recap del sábado
  monthly_sales_recap:      { time: "08:00", day_of_month: 1 }
  monthly_activities_recap: { time: "10:00", day_of_month: 1 }

# Feriados Ecuador (core_config.EC_HOLIDAYS). YAML parsea las fechas sin comillas
# como date nativo. Mantener al menos el año actual + el siguiente.
holidays:
