# Departamento de Marketing — datos del tenant Biodegradables Ecuador.
# content_pillars: HIPÓTESIS iniciales aprobadas por el board 2026-07-06.
# El Analista (F3) las promueve (validated, con exp_ids) o retira (retired)
# según datos — no son reglas fijas. Editar aquí solo agrega hipótesis nuevas.

# Contexto de marca que consume el Guionista (ruta relativa a la raíz del repo)
brand_context_file: company_context.md

# Voz TTS del tenant (catálogo Azure Speech; es-EC = acento ecuatoriano)
tts_voice: es-EC-AndreaNeural

# Claims que el contenido JAMÁS puede afirmar (regla dura del charter — el
# gate rechaza sin pasar por el revisor). Frases en minúsculas, match textual.
claims_prohibidos:
  - "100% biodegradable certificado"
  - "cero impacto ambiental"
  - "certificado por el ministerio"
  - "el más barato del mercado"
  - "aprobado por la fda"
  - "elimina el plástico del planeta"

