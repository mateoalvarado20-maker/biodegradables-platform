# CI del proyecto (Fase 4 del refactor, 2026-06-12).
# Corre en cada push/PR cuando el repo se conecte a GitHub:
#   git remote add origin https://github.com/<org>/biodegradables-platform.git
#   git push -u origin master
# Recomendado: branch protection en master exigiendo este workflow + 1 review.
name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt -r requirements_bot.txt

      - name: Lint (ruff — gate de errores reales)
        run: python -m ruff check .

      - name: Verificar que azfunc/ no tiene drift (fuente única)
        run: python tools/sync_azfunc.py --check

      - name: Tests
        run: python -m pytest tests/ -q

      - name: El paquete del bot se puede construir
        run: python tools/build_bot_package.py --out /tmp/bot_deploy_ci.zip
