# CI del proyecto (Fase 4 del refactor, 2026-06-12).
# Corre en cada push/PR cuando el repo se conecte a GitHub:
#   git remote add origin https://github.com/<org>/biodegradables-platform.git
#   git push -u origin master
# Recomendado: branch protection en master exigiendo este workflow + 1 review.
name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt -r requirements_bot.txt

      - name: Lint (ruff — gate de errores reales)
        run: python -m ruff check .

      - name: Verificar que azfunc/ no tiene drift (fuente única)
        run: python tools/sync_azfunc.py --check

      - name: Pureza del núcleo (core/ no nombra clientes — warning por ahora)
        run: python tools/check_core_purity.py

      - name: Higiene async (sin red síncrona en el event loop — gate F0)
        run: python tools/check_async_hygiene.py teams_bot.py admin_api.py

      - name: Validar paquetes de tenant (gate)
        run: python ops/validate_tenant.py --all

      - name: Tests
        run: python -m pytest tests/ -q

      - name: El paquete del bot se puede construir
        run: python tools/build_bot_package.py --out /tmp/bot_deploy_ci.zip

      # F4.5: la imagen Docker es el artefacto de deploy del futuro (una
      # instancia por tenant). Construirla + smoke de imports en cada PR
      # garantiza que el árbol completo es empaquetable — sin listas manuales.
      - name: La imagen Docker se puede construir
        run: docker build -t veria-platform:ci .

      - name: Smoke de la imagen (imports del entrypoint)
        run: docker run --rm veria-platform:ci python -c "import teams_bot, ask_agent, team_reports, llm_usage, core_config; print('imagen OK')"
